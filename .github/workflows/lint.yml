name: HEMTT

on:
  pull_request:
  push:
    branches:
      - main

env:
  HEMTT_VERSION: ${{ vars.HEMTT_VERSION }}
concurrency:
  group: hemtt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    if: >-
      (github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'No Lint'))
      || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Required for actions/cache to save the HEMTT binary on the default branch.
      actions: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Restore cached HEMTT
        id: hemtt-cache
        uses: actions/cache/restore@v4
        with:
          path: hemtt
          key: hemtt-${{ runner.os }}-x64-${{ vars.HEMTT_VERSION }}
          enableCrossOsArchive: false
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 1

      - name: Add HEMTT to PATH (cached)
        if: steps.hemtt-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:GITHUB_WORKSPACE 'hemtt')

      - name: Setup HEMTT
        if: steps.hemtt-cache.outputs.cache-hit != 'true'
        uses: arma-actions/hemtt@v1
        with:
          version: ${{ vars.HEMTT_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save HEMTT cache (default branch only)
        if: >-
          github.event_name == 'push'
          && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
          && steps.hemtt-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: hemtt
          key: hemtt-${{ runner.os }}-x64-${{ vars.HEMTT_VERSION }}

      - name: Adjust PboPrefix
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $addon = Join-Path $env:GITHUB_WORKSPACE 'addons/SQFlab'
          $mixed = Join-Path $addon 'PboPrefix.txt'
          if (Test-Path -LiteralPath $mixed) {
            Copy-Item -LiteralPath $mixed -Destination (Join-Path $addon 'pboprefix.txt') -Force
            Remove-Item -LiteralPath $mixed -Force
          }

      - name: Run HEMTT check
        run: hemtt check --error-on-all

